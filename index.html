<script>
const URL_CSV = "dataset_final.csv";
let dfPred = [], charts = {};

function setStatus(msg, state){ 
  const el = document.getElementById('statusPill'); 
  if(el) { el.textContent = msg; el.className = 'status-pill ' + (state || ''); }
}

function generarBackupData() {
  const backup = [];
  const hoy = new Date();
  for(let p = 1; p <= 24; p++) {
    const wellId = `P-${String(p).padStart(2, '0')}`;
    for(let i = 0; i < 15; i++) {
      const d = new Date(hoy); d.setDate(d.getDate() - i);
      backup.push({
        Well_ID: wellId,
        Date: d.toISOString().substring(0, 10),
        Oil_rate_bbl_d: 1200 - (i * 5) + Math.random() * 20,
        Water_rate_bbl_d: 150 + (i * 8) + Math.random() * 10,
        Dias_Restantes: 365 - i,
        Prediccion_LSTM_Dias: 360 - i + Math.random() * 15
      });
    }
  }
  return backup;
}

// FUNCIÓN OPTIMIZADA A PRUEBA DE FALLAS Y FORMATOS DE EXCEL
function parsearCSV(texto) {
  const lineas = texto.split(/\r?\n/).filter(l => l.trim() !== "");
  if (lineas.length < 2) return [];

  // Detectar automáticamente si el separador es coma o punto y coma
  const primeraLinea = lineas[0];
  const separador = primeraLinea.includes(';') ? ';' : ',';
  
  const cabeceras = primeraLinea.split(separador).map(c => c.trim().toLowerCase());
  
  // Buscar índices usando mapeo flexible por palabras clave
  const idxWell = cabeceras.findIndex(c => c.includes('well') || c.includes('pozo'));
  const idxDate = cabeceras.findIndex(c => c.includes('date') || c.includes('fecha'));
  const idxOil = cabeceras.findIndex(c => c.includes('oil') || c.includes('petroleo') || c.includes('q_o'));
  const idxWater = cabeceras.findIndex(c => c.includes('water') || c.includes('agua') || c.includes('q_w'));
  const idxReal = cabeceras.findIndex(c => c.includes('restantes') || c.includes('real') || c.includes('rul'));
  const idxPred = cabeceras.findIndex(c => c.includes('prediccion') || c.includes('lstm'));

  const resultado = [];
  
  for (let i = 1; i < lineas.length; i++) {
    const columnas = lineas[i].split(separador);
    if (columnas.length < 2) continue;

    // Asignar con caídas de seguridad por posición si los nombres fallan por completo
    const wellVal = columnas[idxWell >= 0 ? idxWell : 0]?.trim() || "P-01";
    const dateVal = columnas[idxDate >= 0 ? idxDate : 1]?.trim() || new Date().toISOString().substring(0,10);
    const oilVal = parseFloat(columnas[idxOil >= 0 ? idxOil : 2]) || 0;
    const waterVal = parseFloat(columnas[idxWater >= 0 ? idxWater : 3]) || 0;
    const realVal = parseFloat(columnas[idxReal >= 0 ? idxReal : 4]) || 0;
    const predVal = parseFloat(columnas[idxPred >= 0 ? idxPred : 5]) || 0;

    resultado.push({
      Well_ID: wellVal,
      Date: dateVal,
      Oil_rate_bbl_d: oilVal,
      Water_rate_bbl_d: waterVal,
      Dias_Restantes: realVal,
      Prediccion_LSTM_Dias: predVal
    });
  }
  return resultado;
}

async function loadData(){
  try {
    const response = await fetch(URL_CSV);
    if (!response.ok) throw new Error("404");
    const textoRaw = await response.text();
    dfPred = parsearCSV(textoRaw);
    
    if(dfPred.length === 0) {
      throw new Error("Estructura vacía");
    }
    setStatus('● Origen CSV Conectado', 'ok');
  } catch(e) {
    console.warn("Activando datos de respaldo debido a: ", e.message);
    dfPred = generarBackupData();
    setStatus('● Modo Autónomo Activado (Respaldo)', 'warn');
  }
  buildFilters();
  render();
}

function buildFilters(){
  const wells = [...new Set(dfPred.map(r => r.Well_ID))].sort();
  const sel = document.getElementById('wellSel');
  if(!sel) return;
  sel.innerHTML = '';
  wells.forEach(w => { const o = document.createElement('option'); o.value = w; o.textContent = w; sel.appendChild(o); });
  
  const dates = dfPred.map(r => r.Date).sort();
  if(dates.length){
    const fromInput = document.getElementById('dateFrom');
    const toInput = document.getElementById('dateTo');
    if(fromInput) fromInput.value = dates[0];
    if(toInput) toInput.value = dates[dates.length - 1];
  }
  ['wellSel', 'dateFrom', 'dateTo'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.addEventListener('change', render);
  });
}

function getFiltered(){
  const wellSel = document.getElementById('wellSel');
  if(!wellSel) return dfPred;
  const well = wellSel.value;
  const from = document.getElementById('dateFrom')?.value || '';
  const to = document.getElementById('dateTo')?.value || '';
  
  return dfPred.filter(r => {
    if(r.Well_ID !== well) return false;
    if(from && r.Date < from) return false;
    if(to && r.Date > to) return false;
    return true;
  });
}

function render(){
  const data = getFiltered();
  if(!data.length) return;
  const sorted = data.sort((a, b) => new Date(a.Date) - new Date(b.Date));
  const dates = sorted.map(r => r.Date);

  // Actualizar paneles dinámicamente con el último registro disponible del pozo
  const ultimo = sorted[sorted.length - 1];
  
  if(document.getElementById('val1')) {
    document.getElementById('val1').textContent = `${ultimo.Oil_rate_bbl_d.toFixed(1)} bbl/d`;
    document.getElementById('badge1').textContent = '🟢 ACTIVO';
    document.getElementById('card1').className = 'cond-card verde';
    document.getElementById('prog1').style.width = '100%';
  }

  if(document.getElementById('val2')) {
    document.getElementById('val2').textContent = `${ultimo.Water_rate_bbl_d.toFixed(1)} bbl/d`;
    document.getElementById('badge2').textContent = '📊 ESTABLE';
    document.getElementById('card2').className = 'cond-card verde';
    document.getElementById('prog2').style.width = '100%';
  }

  if(document.getElementById('val3')) {
    document.getElementById('val3').textContent = `${Math.round(ultimo.Prediccion_LSTM_Dias)} Días`;
    document.getElementById('badge3').textContent = '🧠 PROYECTADO';
    document.getElementById('card3').className = 'cond-card verde';
    document.getElementById('prog3').style.width = '100%';
  }

  if(charts.pred) charts.pred.destroy();
  const ctxPred = document.getElementById('chartPred');
  if(ctxPred) {
    charts.pred = new Chart(ctxPred, {
      type: 'line',
      data: {
        labels: dates,
        datasets: [
          { label: 'Real', data: sorted.map(r => r.Dias_Restantes), borderColor: '#00e5a0', borderWidth: 2, pointRadius: 2 },
          { label: 'LSTM', data: sorted.map(r => r.Prediccion_LSTM_Dias), borderColor: '#ff3c5a', borderWidth: 2, pointRadius: 2, borderDash: [4, 4] }
        ]
      },
      options: { responsive: true, maintainAspectRatio: false }
    });
  }

  if(charts.oil) charts.oil.destroy();
  const ctxOil = document.getElementById('chartOilWater');
  if(ctxOil) {
    charts.oil = new Chart(ctxOil, {
      type: 'line',
      data: {
        labels: dates,
        datasets: [
          { label: 'Oil', data: sorted.map(r => r.Oil_rate_bbl_d), borderColor: '#00e5a0', borderWidth: 2, pointRadius: 2 },
          { label: 'Water', data: sorted.map(r => r.Water_rate_bbl_d), borderColor: '#3b9eff', borderWidth: 2, pointRadius: 2 }
        ]
      },
      options: { responsive: true, maintainAspectRatio: false }
    });
  }
}

window.onload = loadData;
</script>
