<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tablero de Seguimiento Preventivo - Carga Directa</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #080b12; --bg2: #0e1220; --bg3: #141828; --border: rgba(255,255,255,0.06);
  --green: #00e5a0; --blue: #3b9eff; --pink: #ff6eb4; --red: #ff3c5a;
  --text: #e8eaf0; --muted: #5a6278; --dim: #9ca3af;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Syne',sans-serif;}
body{background:var(--bg);color:var(--text);padding:1.5rem 2rem;}
.header{display:flex;justify-content:space-between;align-items:center;padding-bottom:1rem;border-bottom:1px solid var(--border);margin-bottom:1rem;}
.header-title{font-size:20px;font-weight:800;text-transform:uppercase;}
.header-title span{color:var(--green);}
.status-pill{font-size:11px;font-family:'JetBrains Mono';padding:5px 12px;border-radius:20px;border:1px solid var(--border);}
.status-pill.waiting{border-color:#ffb830;color:#ffb830;background:rgba(255,184,48,0.05);}
.status-pill.ready{border-color:var(--green);color:var(--green);background:rgba(0,229,160,0.05);}

.control-panel{background:var(--bg2);padding:1.25rem;border-radius:12px;border:1px solid var(--border);display:flex;flex-wrap:wrap;gap:1.5rem;align-items:center;margin-bottom:1.5rem;}
.control-group{display:flex;flex-direction:column;gap:6px;}
.control-group label{font-size:10px;font-family:'JetBrains Mono';color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}

input[type="file"]{color:var(--dim);font-size:12px;font-family:'JetBrains Mono';}
select{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:8px 14px;font-size:12px;font-family:'JetBrains Mono';cursor:pointer;}

.conditions-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem;margin-bottom:1.5rem;}
.cond-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1.25rem;}
.cond-header{font-size:10px;font-family:'JetBrains Mono';color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
.cond-val{font-size:32px;font-weight:700;}

.matrix-row-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.25rem;}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1.25rem;}
.chart-title{font-size:11px;font-family:'JetBrains Mono';color:var(--dim);text-transform:uppercase;margin-bottom:1rem;display:block;}
.chart-wrap{position:relative;height:260px;width:100%;}
@media(max-width:900px){.matrix-row-grid,.conditions-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Tablero de <span>Seguimiento Preventivo</span></div>
  </div>
  <div id="statusPill" class="status-pill waiting">Esperando archivo CSV...</div>
</div>

<div class="control-panel">
  <div class="control-group">
    <label>1. Cargar Base de Datos (CSV)</label>
    <input type="file" id="csvFileInput" accept=".csv" />
  </div>
  <div class="control-group">
    <label>2. Seleccionar Pozo Activo</label>
    <select id="wellSel" disabled><option>Cargue un archivo primero...</option></select>
  </div>
</div>

<div class="conditions-grid">
  <div class="cond-card"><div class="cond-header">Petróleo Neto</div><div class="cond-val" id="val1" style="color:var(--green)">—</div></div>
  <div class="cond-card"><div class="cond-header">Agua Asociada</div><div class="cond-val" id="val2" style="color:var(--blue)">—</div></div>
  <div class="cond-card"><div class="cond-header">Proyección RUL (LSTM)</div><div class="cond-val" id="val3" style="color:var(--pink)">—</div></div>
</div>

<div class="matrix-row-grid">
  <div class="chart-card"><span class="chart-title">Vida Útil Restante (Días Reales vs Predicción LSTM)</span><div class="chart-wrap"><canvas id="chartPred"></canvas></div></div>
  <div class="chart-card"><span class="chart-title">Historial Dinámico de Fluidos (bbl/d)</span><div class="chart-wrap"><canvas id="chartOilWater"></canvas></div></div>
</div>

<script>
let dfPred = [];
let chartPredObj = null, chartOilObj = null;

// Lector directo de archivos de disco (Elimina problemas de red y bloqueos de seguridad del navegador)
document.getElementById('csvFileInput').addEventListener('change', function(e) {
  const archivo = e.target.files[0];
  if (!archivo) return;

  const lector = new FileReader();
  lector.onload = function(evt) {
    dfPred = parsearCSV(evt.target.result);
    if(dfPred.length > 0) {
      document.getElementById('statusPill').className = 'status-pill ready';
      document.getElementById('statusPill').textContent = `● ${dfPred.length} Registros Cargados Exitosamente`;
      activarSelectorPozos();
    } else {
      alert("No se pudieron reconocer las columnas. Verifica la estructura del CSV.");
    }
  };
  lector.readAsText(archivo);
});

function parsearCSV(texto) {
  const lineas = texto.split(/\r?\n/).filter(l => l.trim() !== "");
  if(lineas.length < 2) return [];
  
  const sep = lineas[0].includes(';') ? ';' : ',';
  const cab = lineas[0].split(sep).map(c => c.trim().toLowerCase());
  
  // Indexación estricta por palabras clave del encabezado real de tu dataset
  const idxW = cab.findIndex(c => c === 'well_id' || c.includes('well') || c.includes('pozo'));
  const idxD = cab.findIndex(c => c === 'date' || c.includes('fecha') || c.includes('time'));
  const idxO = cab.findIndex(c => c.includes('oil') || c.includes('petroleo') || c.includes('q_o'));
  const idxWc = cab.findIndex(c => c.includes('water') || c.includes('agua') || c.includes('q_w'));
  const idxR = cab.findIndex(c => c.includes('restantes') || c.includes('real') || c.includes('rul'));
  const idxP = cab.findIndex(c => c.includes('prediccion') || c.includes('lstm') || c.includes('pred'));

  return lineas.slice(1).map(l => {
    const col = l.split(sep);
    return {
      Well_ID: col[idxW >= 0 ? idxW : 0]?.trim() || "P-01", 
      Date: col[idxD >= 0 ? idxD : 1]?.trim() || "",
      Oil: parseFloat(col[idxO >= 0 ? idxO : 2]) || 0, 
      Water: parseFloat(col[idxWc >= 0 ? idxWc : 3]) || 0,
      Real: parseFloat(col[idxR >= 0 ? idxR : 4]) || 0, 
      Pred: parseFloat(col[idxP >= 0 ? idxP : 5]) || 0
    };
  });
}

function activarSelectorPozos() {
  const wells = [...new Set(dfPred.map(r => r.Well_ID))].sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));
  const sel = document.getElementById('wellSel');
  sel.removeAttribute('disabled');
  sel.innerHTML = wells.map(w => `<option value="${w}">Pozo ${w}</option>`).join('');
  sel.addEventListener('change', render);
  render();
}

function render() {
  const well = document.getElementById('wellSel').value;
  // Ordenamiento cronológico estricto basado en las fechas nativas del archivo
  const filtered = dfPred.filter(r => r.Well_ID === well).sort((a,b) => new Date(a.Date) - new Date(b.Date));
  if(!filtered.length) return;
  
  const ult = filtered[filtered.length - 1];
  document.getElementById('val1').textContent = `${ult.Oil.toFixed(1)} bbl/d`;
  document.getElementById('val2').textContent = `${ult.Water.toFixed(1)} bbl/d`;
  document.getElementById('val3').textContent = `${Math.round(ult.Pred)} Días`;

  const dates = filtered.map(r => r.Date);
  const opt = { 
    responsive: true, 
    maintainAspectRatio: false, 
    plugins: { legend: { display: false } },
    scales: {
      x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#5a6278', font: { family: 'JetBrains Mono', size: 10 } } },
      y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#5a6278', font: { family: 'JetBrains Mono', size: 10 } } }
    }
  };

  if(chartPredObj) chartPredObj.destroy();
  chartPredObj = new Chart(document.getElementById('chartPred'), {
    type: 'line',
    data: { labels: dates, datasets: [
      { label: 'Real', data: filtered.map(r=>r.Real), borderColor: '#00e5a0', borderWidth: 2, pointRadius: 0, tension: 0.1 },
      { label: 'LSTM', data: filtered.map(r=>r.Pred), borderColor: '#ff3c5a', borderWidth: 2, borderDash: [4,4], pointRadius: 0, tension: 0.1 }
    ]}, options: opt
  });

  if(chartOilObj) chartOilObj.destroy();
  chartOilObj = new Chart(document.getElementById('chartOilWater'), {
    type: 'line',
    data: { labels: dates, datasets: [
      { label: 'Oil', data: filtered.map(r=>r.Oil), borderColor: '#00e5a0', borderWidth: 2, pointRadius: 0, tension: 0.1 },
      { label: 'Water', data: filtered.map(r=>r.Water), borderColor: '#3b9eff', borderWidth: 2, pointRadius: 0, tension: 0.1 }
    ]}, options: opt
  });
}
</script>
</body>
</html>
